<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<title>Globe</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="./assets/Dkg2SAQs.css" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }

  rle-globe { display: block; position: fixed; inset: 0; }
  #globe {
    display: block !important;
    width: 100% !important; height: 100% !important;
    position: absolute !important; top: 0 !important; overflow: hidden !important;
  }
  #globe canvas { width: 100dvw !important; height: 100dvh !important; }

  /* 国家悬停标签 */
  #globe-country-label {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    color: #fff;
    font-family: 'Google Sans', Arial, sans-serif;
    font-size: 13px;
    letter-spacing: 0.05em;
    text-shadow: 0 1px 4px rgba(0,0,0,0.8);
    z-index: 100;
    transition: opacity 0.2s;
  }

  /* 右侧信息面板 */
  #info-panel {
    position: fixed;
    right: 0; top: 0; bottom: 0;
    width: 340px;
    background: rgba(8,14,26,0.92);
    backdrop-filter: blur(12px);
    border-left: 1px solid rgba(255,255,255,0.08);
    transform: translateX(100%);
    transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
    z-index: 200;
    overflow-y: auto;
    padding: 28px 24px;
    color: #e0e0e0;
    font-family: 'Google Sans', Arial, sans-serif;
  }
  #info-panel.open { transform: translateX(0); }

  #panel-close {
    position: absolute;
    top: 16px; right: 16px;
    background: none; border: none;
    color: #888; cursor: pointer;
    font-size: 20px; line-height: 1;
    padding: 4px 8px;
  }
  #panel-close:hover { color: #fff; }

  #panel-country {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 8px;
  }
  #panel-title {
    font-size: 20px;
    font-weight: 500;
    color: #fff;
    margin-bottom: 20px;
    line-height: 1.3;
  }
  .movie-item {
    display: flex;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    cursor: pointer;
    transition: background 0.15s;
  }
  .movie-item:hover { background: rgba(255,255,255,0.04); margin: 0 -8px; padding: 12px 8px; }
  .movie-poster {
    width: 44px; height: 62px;
    object-fit: cover;
    border-radius: 3px;
    background: #1a2030;
    flex-shrink: 0;
  }
  .movie-info { flex: 1; min-width: 0; }
  .movie-title { font-size: 14px; font-weight: 500; color: #fff; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .movie-director { font-size: 12px; color: #888; margin-bottom: 4px; }
  .movie-meta { font-size: 11px; color: #666; }
  .movie-score { color: #f5a623; }

  /* 加载提示 */
  #loading-hint {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.3);
    font-size: 12px;
    font-family: Arial, sans-serif;
    pointer-events: none;
    transition: opacity 0.5s;
  }
</style>

<!-- 1. 电影数据 -->
<script src="./female-directors-movies-data.js"></script>
<script>
(function () {
  var data = window.femaleDirectorsMovies;
  if (!data) return;
  var count = {}, seen = {};
  data.forEach(function (m) {
    var k = m.latitude + ',' + m.longitude;
    count[k] = (count[k] || 0) + 1;
  });
  window._movieTe = data.map(function (m) {
    var k = m.latitude + ',' + m.longitude;
    var n = count[k];
    var i = (seen[k] = (seen[k] || 0) + 1);
    var angle = (i / n) * 2 * Math.PI;
    var r = n > 1 ? 1.5 + (i * 0.7 % 1.5) : 0;
    var cosLat = Math.cos(m.latitude * Math.PI / 180) || 0.1;
    m._jlat = m.latitude + r * Math.cos(angle);
    m._jlon = m.longitude + r * Math.sin(angle) / cosLat;
    return [m._jlat, m._jlon, m.name];
  });
  window._movieBallCount = window._movieTe.length;
})();
</script>

<!-- 2. Globe 组件（不含整个 UI 应用 sHKlBl1N） -->
<script type="module" src="./assets/DtqKTFO9.min.js"></script>
<script type="module" src="./assets/CgFNmmkn.min.js"></script>
<script type="module" src="./assets/B1Ppr2Cb.min.js"></script>
<script type="module" src="./assets/BjblsY1K.min.js"></script>
<script type="module" src="./assets/C2DW12fk.min.js"></script>

<!-- 3. 启动逻辑 + 交互响应 -->
<script type="module">
  const body = document.body;

  // ── Globe 初始化序列：GlobeApp.init() 需要 3 个 next-step ──
  // 每次 globe 发出加载阶段事件后，立即推进到下一步
  ['main-globe-load-start', 'main-globe-country-load-start', 'main-globe-load-complete']
    .forEach(evt => {
      body.addEventListener(evt, () => {
        setTimeout(() => body.dispatchEvent(new CustomEvent('next-step')), 0);
      });
    });

  // Globe 就绪后隐藏加载提示
  body.addEventListener('globe-ready', () => {
    const hint = document.getElementById('loading-hint');
    if (hint) hint.style.opacity = '0';
    // 告知 globe 开始旋转
    body.dispatchEvent(new CustomEvent('globe-intro-start-globe-rotation'));
    body.dispatchEvent(new CustomEvent('globe-intro-show-world-overview'));
  });

  // ── 国家悬停标签（globe 通过 document.body 属性通信）──
  const labelEl = document.getElementById('globe-country-label');
  const labelObserver = new MutationObserver(() => {
    const val = body.getAttribute('globe-hover-country');
    if (labelEl) labelEl.textContent = val || '';
  });
  labelObserver.observe(body, { attributes: true, attributeFilter: ['globe-hover-country'] });

  // ── 交互面板：国家/电影选中 ──
  const panel = document.getElementById('info-panel');
  const panelCountry = document.getElementById('panel-country');
  const panelTitle = document.getElementById('panel-title');
  const panelList = document.getElementById('panel-list');

  function countryCodeToName(code) {
    const map = {
      cn: '中国', us: '美国', fr: '法国', de: '德国', gb: '英国',
      jp: '日本', kr: '韩国', it: '意大利', es: '西班牙', au: '澳大利亚',
      ca: '加拿大', br: '巴西', mx: '墨西哥', ar: '阿根廷', in: '印度',
      ru: '俄罗斯', se: '瑞典', dk: '丹麦', no: '挪威', nl: '荷兰',
    };
    return map[code] || code.toUpperCase();
  }

  function showMoviesForCountry(countryCode) {
    const movies = (window.femaleDirectorsMovies || [])
      .filter(m => m.country_code === countryCode || (m.country || '').toLowerCase().includes(countryCode));
    if (!movies.length) return false;

    panelCountry.textContent = countryCodeToName(countryCode);
    panelTitle.textContent = `${movies.length} 部作品`;
    panelList.innerHTML = movies.slice(0, 30).map(m => `
      <div class="movie-item">
        <img class="movie-poster" src="${m.poster_path || ''}" onerror="this.style.display='none'" loading="lazy" />
        <div class="movie-info">
          <div class="movie-title">${m.name || m.title || ''}</div>
          <div class="movie-director">${m.director || ''}</div>
          <div class="movie-meta">
            ${m.year || ''}&nbsp;
            ${m.score ? `<span class="movie-score">★ ${m.score}</span>` : ''}
          </div>
        </div>
      </div>
    `).join('');
    return true;
  }

  function showMovieByName(name) {
    const movie = (window.femaleDirectorsMovies || []).find(m =>
      (m.name || m.title || '') === name
    );
    if (!movie) return false;

    panelCountry.textContent = movie.director || '';
    panelTitle.textContent = movie.name || movie.title || '';
    panelList.innerHTML = `
      <div style="margin-bottom:16px">
        ${movie.poster_path ? `<img src="${movie.poster_path}" style="width:100%;border-radius:6px;margin-bottom:12px" onerror="this.style.display='none'" />` : ''}
        <div style="font-size:13px;color:#aaa;line-height:1.7">
          ${movie.year ? `<div>年份：${movie.year}</div>` : ''}
          ${movie.country ? `<div>国家：${movie.country}</div>` : ''}
          ${movie.score ? `<div>评分：<span class="movie-score">★ ${movie.score}</span></div>` : ''}
          ${movie.box_office ? `<div>票房：${movie.box_office}</div>` : ''}
          ${movie.genre ? `<div>类型：${movie.genre}</div>` : ''}
        </div>
      </div>
    `;
    return true;
  }

  // 监听 globe 选中事件（window 级别）
  window.addEventListener('rle-selection-change', (e) => {
    const { type, value } = e.detail || {};
    if (!value) { panel.classList.remove('open'); return; }

    let shown = false;
    if (type === 'language') {
      shown = showMovieByName(value) || showMoviesForCountry(value);
    } else if (type === 'country') {
      shown = showMoviesForCountry(value);
    }
    panel.classList.toggle('open', shown);
  });

  document.getElementById('panel-close').addEventListener('click', () => {
    panel.classList.remove('open');
  });

  // ── 启动 Globe ──
  window.addEventListener('load', () => {
    setTimeout(() => {
      body.dispatchEvent(new CustomEvent('preloader-ready-loading'));
    }, 200);
  });
</script>
</head>
<body>
  <!-- Globe 主体 -->
  <rle-globe>
    <div id="globe"><canvas id="globe-canvas" aria-hidden="true"></canvas></div>
  </rle-globe>

  <!-- 国家悬停标签 -->
  <div id="globe-country-label"></div>

  <!-- 右侧信息面板 -->
  <div id="info-panel">
    <button id="panel-close">✕</button>
    <div id="panel-country"></div>
    <div id="panel-title"></div>
    <div id="panel-list"></div>
  </div>

  <div id="loading-hint">正在加载地球…</div>
</body>
</html>
