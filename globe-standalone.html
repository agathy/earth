<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<title>Globe</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
  canvas { display: block; }

  /* 国家悬停标签 */
  #globe-country-label {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    color: #fff;
    font-family: Arial, sans-serif;
    font-size: 13px;
    letter-spacing: 0.08em;
    text-shadow: 0 1px 6px rgba(0,0,0,0.9);
    z-index: 100;
  }

  /* 右侧信息面板 */
  #info-panel {
    position: fixed; right: 0; top: 0; bottom: 0;
    width: 340px;
    background: rgba(8,14,26,0.92);
    backdrop-filter: blur(12px);
    border-left: 1px solid rgba(255,255,255,0.08);
    transform: translateX(100%);
    transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
    z-index: 200; overflow-y: auto;
    padding: 28px 24px;
    color: #e0e0e0;
    font-family: Arial, sans-serif;
  }
  #info-panel.open { transform: translateX(0); }
  #panel-close {
    position: absolute; top: 16px; right: 16px;
    background: none; border: none; color: #888;
    cursor: pointer; font-size: 18px; padding: 4px 8px;
  }
  #panel-close:hover { color: #fff; }
  #panel-country { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: #888; margin-bottom: 6px; }
  #panel-title   { font-size: 20px; font-weight: 500; color: #fff; margin-bottom: 20px; line-height: 1.3; }
  .movie-item    { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.07); }
  .movie-poster  { width: 44px; height: 62px; object-fit: cover; border-radius: 3px; background: #1a2030; flex-shrink: 0; }
  .movie-info    { flex: 1; min-width: 0; }
  .movie-title   { font-size: 14px; font-weight: 500; color: #fff; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .movie-dir     { font-size: 12px; color: #888; margin-bottom: 3px; }
  .movie-meta    { font-size: 11px; color: #666; }
  .score         { color: #f5a623; }
</style>
</head>
<body>

<canvas id="globe-canvas"></canvas>
<div id="globe-country-label"></div>

<div id="info-panel">
  <button id="panel-close">✕</button>
  <div id="panel-country"></div>
  <div id="panel-title"></div>
  <div id="panel-list"></div>
</div>

<!-- ① Three.js r174（替换 Ca8ypu82.min.js）-->
<script src="https://cdn.jsdelivr.net/npm/three@0.174/build/three.min.js"></script>

<!-- ② 电影数据 -->
<script src="./female-directors-movies-data.js"></script>
<script>
(function () {
  var data = window.femaleDirectorsMovies;
  if (!data) return;
  var count = {}, seen = {};
  data.forEach(function (m) {
    var k = m.latitude + ',' + m.longitude;
    count[k] = (count[k] || 0) + 1;
  });
  window._movieTe = data.map(function (m) {
    var k = m.latitude + ',' + m.longitude;
    var n = count[k], i = (seen[k] = (seen[k] || 0) + 1);
    var angle = (i / n) * 2 * Math.PI;
    var r = n > 1 ? 1.5 + (i * 0.7 % 1.5) : 0;
    var cosLat = Math.cos(m.latitude * Math.PI / 180) || 0.1;
    m._jlat = m.latitude + r * Math.cos(angle);
    m._jlon = m.longitude + r * Math.sin(angle) / cosLat;
    return [m._jlat, m._jlon, m.name];
  });
  window._movieBallCount = window._movieTe.length;
})();
</script>

<!-- ③ Settings（替换 U-63NcXm.min.js 中的 Settings 部分）-->
<script src="./my-globe-settings.js"></script>

<!-- ④ 国家 GeoJSON（替换 U-63NcXm.min.js 中的 COUNTRY_DATA 部分）-->
<script src="./country-geojson.js"></script>

<!-- ⑤ 粒子着色器（替换 B1Ppr2Cb.min.js）-->
<script src="./my-particle-globe.js"></script>

<!-- ⑥ 大气层（替换 BjblsY1K.min.js）-->
<script src="./my-atmosphere.js"></script>

<!-- ⑦ GlobeApp 核心引擎（替换 DtqKTFO9.min.js + C2DW12fk.min.js）-->
<script src="./my-globe-app.js"></script>

<!-- ⑧ 启动 + 交互面板 -->
<script>
window.addEventListener('load', function () {
  // 启动 Globe
  var canvas = document.getElementById('globe-canvas');
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;

  var app = new GlobeApp({ canvas: canvas });
  app.start();

  // 国家悬停标签
  var labelEl = document.getElementById('globe-country-label');
  new MutationObserver(function () {
    labelEl.textContent = document.body.getAttribute('globe-hover-country') || '';
  }).observe(document.body, { attributes: true, attributeFilter: ['globe-hover-country'] });

  // 信息面板
  var panel       = document.getElementById('info-panel');
  var panelCountry = document.getElementById('panel-country');
  var panelTitle  = document.getElementById('panel-title');
  var panelList   = document.getElementById('panel-list');

  function showMoviesForCountry(code) {
    var movies = (window.femaleDirectorsMovies || []).filter(function (m) {
      return (m.country_code || '').toLowerCase() === code ||
             (m.country || '').toLowerCase().includes(code);
    });
    if (!movies.length) return false;
    panelCountry.textContent = code.toUpperCase();
    panelTitle.textContent   = movies.length + ' 部作品';
    panelList.innerHTML = movies.slice(0, 30).map(function (m) {
      return '<div class="movie-item">' +
        (m.poster_path ? '<img class="movie-poster" src="' + m.poster_path + '" loading="lazy" onerror="this.style.display=\'none\'" />' : '') +
        '<div class="movie-info">' +
          '<div class="movie-title">' + (m.name || m.title || '') + '</div>' +
          '<div class="movie-dir">' + (m.director || '') + '</div>' +
          '<div class="movie-meta">' + (m.year || '') +
            (m.score ? ' <span class="score">★ ' + m.score + '</span>' : '') +
          '</div>' +
        '</div></div>';
    }).join('');
    return true;
  }

  function showMovieByName(name) {
    var movie = (window.femaleDirectorsMovies || []).find(function (m) {
      return (m.name || m.title || '') === name;
    });
    if (!movie) return false;
    panelCountry.textContent = movie.director || '';
    panelTitle.textContent   = movie.name || movie.title || '';
    panelList.innerHTML =
      (movie.poster_path ? '<img src="' + movie.poster_path + '" style="width:100%;border-radius:6px;margin-bottom:12px" onerror="this.style.display=\'none\'" />' : '') +
      '<div style="font-size:13px;color:#aaa;line-height:1.9">' +
        (movie.year    ? '<div>年份：' + movie.year + '</div>' : '') +
        (movie.country ? '<div>国家：' + movie.country + '</div>' : '') +
        (movie.score   ? '<div>评分：<span class="score">★ ' + movie.score + '</span></div>' : '') +
        (movie.genre   ? '<div>类型：' + movie.genre + '</div>' : '') +
      '</div>';
    return true;
  }

  window.addEventListener('rle-selection-change', function (e) {
    var type = e.detail && e.detail.type;
    var value = e.detail && e.detail.value;
    if (!value) { panel.classList.remove('open'); return; }
    var shown = type === 'language'
      ? (showMovieByName(value) || showMoviesForCountry(value))
      : showMoviesForCountry(value);
    panel.classList.toggle('open', !!shown);
  });

  document.getElementById('panel-close').addEventListener('click', function () {
    panel.classList.remove('open');
  });
});
</script>

</body>
</html>
