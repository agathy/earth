<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<title>herearth</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link rel="stylesheet" href="src/css/main.css">
<link rel="stylesheet" href="src/css/components.css">
<style>
  /* 多条杠杠加载动画 */
  @keyframes barAnimation {
    0%, 40%, 100% {
      transform: scaleY(0.4);
      opacity: 0.4;
    }
    20% {
      transform: scaleY(1);
      opacity: 1;
    }
  }
</style>
</head>
<body>

<!-- 开场加载动画 -->
<div id="loading-screen" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#000000;z-index:9999;display:flex;align-items:center;justify-content:center;transition:opacity 0.5s ease;">
  <div class="loading-bars" style="display:flex;align-items:center;gap:4px;">
    <div class="loading-bar" style="width:4px;height:20px;background:#ffffff;animation:barAnimation 1.2s ease-in-out infinite;"></div>
    <div class="loading-bar" style="width:4px;height:20px;background:#ffffff;animation:barAnimation 1.2s ease-in-out infinite 0.1s;"></div>
    <div class="loading-bar" style="width:4px;height:20px;background:#ffffff;animation:barAnimation 1.2s ease-in-out infinite 0.2s;"></div>
    <div class="loading-bar" style="width:4px;height:20px;background:#ffffff;animation:barAnimation 1.2s ease-in-out infinite 0.3s;"></div>
    <div class="loading-bar" style="width:4px;height:20px;background:#ffffff;animation:barAnimation 1.2s ease-in-out infinite 0.4s;"></div>
    <div class="loading-bar" style="width:4px;height:20px;background:#ffffff;animation:barAnimation 1.2s ease-in-out infinite 0.5s;"></div>
    <div class="loading-bar" style="width:4px;height:20px;background:#ffffff;animation:barAnimation 1.2s ease-in-out infinite 0.6s;"></div>
    <div class="loading-bar" style="width:4px;height:20px;background:#ffffff;animation:barAnimation 1.2s ease-in-out infinite 0.7s;"></div>
  </div>
</div>

<canvas id="globe-canvas"></canvas>
<div id="globe-country-label"></div>

<!-- 时间轴年份显示 - 2D UI层，左起右止半圆排列 -->
<div id="timeline-years-container" style="position:fixed;inset:0;pointer-events:none;z-index:100;opacity:0;transition:opacity 0.4s ease;">
  <!-- 年份标签将通过JS动态生成 -->
</div>

<!-- 左侧统计面板 -->
<div id="left-stats">
  <!-- 国家名称（选择国家时显示，绝对定位在面板上方） -->
  <div id="selected-country-label">国家名称</div>
  
  <div class="stat-item">
    <span class="stat-label" id="movies-label">电影</span>
    <span class="stat-value" id="total-movies">0</span>
  </div>
  <div class="stat-item">
    <span class="stat-label" id="directors-label">导演</span>
    <span class="stat-value" id="total-directors">0</span>
  </div>
</div>

<!-- 右侧统计面板 -->
<div id="right-stats">
  <!-- 上半部分：已看电影数字和横线 -->
  <div id="right-stats-top" style="transition: transform 2.8s cubic-bezier(0.16, 1, 0.3, 1);">
    <div class="watched-label">已看电影</div>
    <div class="watched-count" id="watched-count">0</div>
    <div style="width: 100%; height: 1px; background: rgba(255,255,255,0.2); margin: 8px 0;"></div>
  </div>

  <!-- 中间部分：国家导演和电影列表（点击国家时显示） -->
  <div id="country-lists-section" style="max-height: 0; overflow: hidden; opacity: 0; transition: max-height 2.8s cubic-bezier(0.16, 1, 0.3, 1), opacity 2.8s cubic-bezier(0.16, 1, 0.3, 1), margin 2.8s cubic-bezier(0.16, 1, 0.3, 1);">
    <!-- 导演+电影组合列表 -->
    <div id="director-movies-list" style="display: flex; flex-direction: column; gap: 8px; padding: 4px 0;"></div>
  </div>
  
  <!-- 滑动查看更多提示（放在百分比上方） -->
  <div id="scroll-hint" style="text-align: center; padding: 8px 0; font-size: 11px; color: rgba(255,255,255,0.5); opacity: 0; transition: opacity 0.3s ease;">
    <span style="display: inline-flex; align-items: center; gap: 4px;">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="animation: bounce 1.5s infinite;">
        <polyline points="6 9 12 15 18 9"></polyline>
      </svg>
      滑动查看更多
    </span>
  </div>
  
  <!-- 下半部分：比例 -->
  <div id="right-stats-bottom" style="transition: transform 2.8s cubic-bezier(0.16, 1, 0.3, 1);">
    <div class="watched-ratio" id="watched-ratio">0%</div>
  </div>
</div>

<!-- 控制面板 -->
<div id="control-panel" class="collapsed">
  <button id="panel-toggle">+</button>
  <h3>地球设置</h3>
  <div class="control-content">
    <div class="control-row">
      <label>背景颜色</label>
      <div style="display:flex;align-items:center;gap:8px;">
        <input type="color" id="bg-color-picker" value="#000000">
        <input type="text" id="bg-color-hex" value="#000000" style="width:70px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:4px;padding:4px 8px;color:#fff;font-size:12px;">
      </div>
    </div>
    <div class="control-row">
      <label>有电影国家边线</label>
      <div style="display:flex;align-items:center;gap:8px;">
        <input type="color" id="border-color-picker" value="#949494">
        <input type="text" id="border-color-hex" value="#949494" style="width:70px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:4px;padding:4px 8px;color:#fff;font-size:12px;">
      </div>
    </div>
    <div class="control-row">
      <label>无电影国家边线</label>
      <div style="display:flex;align-items:center;gap:8px;">
        <input type="color" id="border-color-empty-picker" value="#545454">
        <input type="text" id="border-color-empty-hex" value="#545454" style="width:70px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:4px;padding:4px 8px;color:#fff;font-size:12px;">
      </div>
    </div>
    <div class="control-row">
      <label>浮起颜色</label>
      <div style="display:flex;align-items:center;gap:8px;">
        <input type="color" id="highlight-color-picker" value="#b8b8b8">
        <input type="text" id="highlight-color-hex" value="#b8b8b8" style="width:70px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:4px;padding:4px 8px;color:#fff;font-size:12px;">
      </div>
    </div>
    <div class="control-row">
      <label>边线粗细</label>
      <div style="display:flex;align-items:center;gap:8px;">
        <input type="range" id="border-width-slider" min="0.5" max="5" step="0.5" value="1.5">
        <span class="slider-value" id="width-value">1.5</span>
      </div>
    </div>
    <div class="control-row">
      <label>浮起速度</label>
      <div style="display:flex;align-items:center;gap:8px;">
        <input type="range" id="float-speed-slider" min="50" max="800" step="50" value="800">
        <span class="slider-value" id="speed-value">800</span>
      </div>
    </div>
    <div class="control-row">
      <label>大气亮度</label>
      <div style="display:flex;align-items:center;gap:8px;">
        <input type="range" id="atmosphere-brightness" min="0" max="3" step="0.1" value="0.7">
        <span class="slider-value" id="brightness-value">0.7</span>
      </div>
    </div>
    <div class="control-row">
      <label>大气密度</label>
      <div style="display:flex;align-items:center;gap:8px;">
        <input type="range" id="atmosphere-density" min="4" max="96" step="4" value="80">
        <span class="slider-value" id="density-value">80</span>
      </div>
    </div>
    <div class="control-row">
      <label>大气高度</label>
      <div style="display:flex;align-items:center;gap:8px;">
        <input type="range" id="atmosphere-height" min="1.02" max="1.20" step="0.02" value="1.04">
        <span class="slider-value" id="height-value">1.04</span>
      </div>
    </div>
    <div class="control-row">
      <label>大气颜色</label>
      <div style="display:flex;align-items:center;gap:8px;">
        <input type="color" id="atmosphere-color" value="#000000">
        <input type="text" id="atmosphere-color-hex" value="#000000" style="width:70px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:4px;padding:4px 8px;color:#fff;font-size:12px;">
      </div>
    </div>
    <div class="control-row">
      <label>海报大小</label>
      <div style="display:flex;align-items:center;gap:8px;">
        <input type="range" id="poster-size-slider" min="10" max="50" step="2" value="18">
        <span class="slider-value" id="poster-size-value">18</span>
      </div>
    </div>
    <div class="control-row">
      <label>海报高度</label>
      <div style="display:flex;align-items:center;gap:8px;">
        <input type="range" id="poster-height-slider" min="1.01" max="1.20" step="0.01" value="1.05">
        <span class="slider-value" id="poster-height-value">1.05</span>
      </div>
    </div>
    <div class="control-row">
      <label>已看比例</label>
      <div style="display:flex;align-items:center;gap:8px;">
        <input type="range" id="watched-ratio-slider" min="0" max="100" step="5" value="80">
        <span class="slider-value" id="watched-ratio-value">80%</span>
      </div>
    </div>
    <div class="control-row">
      <label></label>
      <button id="refresh-random-btn" style="background:rgba(255,180,0,0.3);border:1px solid rgba(255,180,0,0.5);color:#fff;padding:6px 12px;border-radius:4px;cursor:pointer;font-size:12px;">🎲 刷新随机</button>
    </div>
    <div class="control-row">
      <label>电影海报</label>
      <button id="toggle-posters-btn" style="background:rgba(100,200,100,0.3);border:1px solid rgba(100,200,100,0.5);color:#fff;padding:6px 12px;border-radius:4px;cursor:pointer;font-size:12px;">👁️ 显示海报</button>
    </div>
    <div class="control-row">
      <label>边缘宽度</label>
      <div style="display:flex;align-items:center;gap:8px;">
        <input type="range" id="fresnel-width" min="0.5" max="5" step="0.1" value="1.5">
        <span class="slider-value" id="fresnel-value">1.5</span>
      </div>
    </div>
    <div class="control-row">
      <label>浮起高度</label>
      <div style="display:flex;align-items:center;gap:8px;">
        <input type="range" id="float-height" min="1.005" max="1.2" step="0.005" value="1.07">
        <span class="slider-value" id="float-height-value">1.07</span>
      </div>
    </div>
    <div class="control-row">
      <label>发光颜色</label>
      <div style="display:flex;align-items:center;gap:8px;">
        <input type="color" id="glow-color" value="#474747">
        <input type="text" id="glow-color-hex" value="#474747" style="width:70px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:4px;padding:4px 8px;color:#fff;font-size:12px;">
      </div>
    </div>
    <div class="upload-row">
      <label class="upload-label">地球贴图</label>
      <div class="upload-btn-wrapper">
        <button class="upload-btn">选择图片</button>
        <input type="file" id="texture-upload" accept="image/*">
      </div>
      <div class="upload-filename" id="texture-filename">未选择文件</div>
      <button class="reset-texture-btn" id="reset-texture">恢复默认</button>
    </div>
    <div class="control-row">
      <label>贴图透明度</label>
      <div style="display:flex;align-items:center;gap:8px;">
        <input type="range" id="texture-opacity" min="0" max="1" step="0.05" value="1">
        <span class="slider-value" id="texture-opacity-value">1</span>
      </div>
    </div>
    <!-- 水平偏移滑块已隐藏，使用默认偏移-0.25 -->
    <div class="control-row" id="texture-offset-row" style="display:none;">
      <label>水平偏移</label>
      <div style="display:flex;align-items:center;gap:8px;">
        <input type="range" id="texture-offset-x" min="-0.5" max="0.5" step="0.05" value="-0.25">
        <span class="slider-value" id="offset-x-value">-0.25</span>
      </div>
    </div>
    <div class="control-row">
      <label>粒子半径偏移</label>
      <div style="display:flex;align-items:center;gap:8px;">
        <input type="range" id="particle-radius-offset" min="0" max="20" step="1" value="5">
        <span class="slider-value" id="particle-radius-value">5</span>
      </div>
    </div>
    <div class="control-row">
      <label>选中旋转速度(秒)</label>
      <div style="display:flex;align-items:center;gap:8px;">
        <input type="range" id="rotate-speed" min="0.5" max="3" step="0.1" value="1">
        <span class="slider-value" id="rotate-speed-value">1.0</span>
      </div>
    </div>
    <div class="control-row">
      <label>电影海报大小</label>
      <div style="display:flex;align-items:center;gap:8px;">
        <input type="range" id="poster-size" min="10" max="50" step="2" value="20">
        <span class="slider-value" id="poster-size-value">20</span>
      </div>
    </div>
    <div class="control-row">
      <label>Bloom强度</label>
      <div style="display:flex;align-items:center;gap:8px;">
        <input type="range" id="bloom-strength" min="0" max="10" step="0.5" value="10">
        <span class="slider-value" id="bloom-strength-value">10.0</span>
      </div>
    </div>
    <div class="control-row">
      <label>Bloom阈值</label>
      <div style="display:flex;align-items:center;gap:8px;">
        <input type="range" id="bloom-threshold" min="0" max="2" step="0.1" value="0.4">
        <span class="slider-value" id="bloom-threshold-value">0.4</span>
      </div>
    </div>
    <div class="control-row">
      <label>Bloom半径</label>
      <div style="display:flex;align-items:center;gap:8px;">
        <input type="range" id="bloom-radius" min="0" max="3" step="0.1" value="0.4">
        <span class="slider-value" id="bloom-radius-value">0.4</span>
      </div>
    </div>
    <div class="control-row">
      <label>Bloom开关</label>
      <div style="display:flex;align-items:center;gap:8px;">
        <input type="checkbox" id="bloom-enabled" checked>
        <span>启用</span>
      </div>
    </div>
    <div class="control-row">
      <label>边界发光强度</label>
      <div style="display:flex;align-items:center;gap:8px;">
        <input type="range" id="border-glow-intensity" min="0" max="5" step="0.1" value="0">
        <span class="slider-value" id="border-glow-intensity-value">0</span>
      </div>
    </div>
    <div class="control-row">
      <label>时间轴亮度</label>
      <div style="display:flex;align-items:center;gap:8px;">
        <input type="range" id="timeline-brightness" min="0.1" max="2" step="0.1" value="1">
        <span class="slider-value" id="timeline-brightness-value">1.0</span>
      </div>
    </div>
    <div class="control-row">
      <label>运动暂停</label>
      <button id="pause-motion-btn" style="background:rgba(255,100,100,0.3);border:1px solid rgba(255,100,100,0.5);color:#fff;padding:6px 16px;border-radius:4px;cursor:pointer;font-size:12px;transition:all 0.2s;">⏸️ 暂停</button>
    </div>
    <div class="config-row">
      <button class="save-config-btn" id="save-config">💾 保存当前配置</button>
      <button class="save-config-btn" id="export-config" style="margin-left:8px;background:rgba(100,180,255,0.3);">📤 导出配置</button>
      <div style="display:inline-block;position:relative;margin-left:8px;">
        <button class="save-config-btn" id="import-config-btn" style="background:rgba(255,180,100,0.3);">📥 导入配置</button>
        <input type="file" id="import-config-file" accept=".json" style="position:absolute;left:0;top:0;width:100%;height:100%;opacity:0;cursor:pointer;">
      </div>
    </div>
  </div>
</div>

<div id="info-panel" style="display: none;">
  <button id="panel-close" aria-label="关闭面板">
    <svg aria-hidden="true" width="16" height="16" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M11 1L6 6L11 11" stroke="currentColor" stroke-width="1.5"></path>
      <path d="M1 11L6 6L1 1" stroke="currentColor" stroke-width="1.5"></path>
    </svg>
  </button>
  <div id="panel-container">
    <!-- 顶部固定区域 -->
    <div class="panel-header-sticky">
      <!-- 主卡片区域 -->
      <div class="panel-hero">
        <div class="panel-hero-main">
          <div class="panel-hero-label">国家 / 地区</div>
          <div class="panel-hero-title" id="panel-country">国家/地区</div>
        </div>
        <!-- 统计区域 - 放在国家名称右边 -->
        <div id="panel-stats">
          <div class="stat-item">
            <div class="stat-value" id="stat-movies">0</div>
            <div class="stat-label">电影</div>
          </div>
          <div class="stat-divider"></div>
          <div class="stat-item">
            <div class="stat-value" id="stat-directors">0</div>
            <div class="stat-label">女性导演</div>
          </div>
          <div class="stat-divider"></div>
          <div class="stat-item">
            <div class="stat-value" id="stat-watched">0</div>
            <div class="stat-label">已看</div>
          </div>
        </div>
      </div>
    </div>

    <!-- 可滚动内容区域 -->
    <div class="panel-scrollable-content">
      <!-- 导演区域 -->
      <div class="directors-section">
        <div class="section-title">导演</div>
        <div class="director-list" id="director-list"></div>
      </div>

      <!-- 电影区域 -->
      <div class="movies-section">
        <div class="section-title">电影</div>
        <div class="movies-list" id="movies-list"></div>
      </div>

      <!-- 滚动提示 -->
      <div class="scroll-hint">向下滚动查看更多</div>
    </div>
  </div>
</div>

<!-- 海报详情卡片 - hover时显示 -->
<div id="movie-card-overlay" style="display:none;position:fixed;inset:0;z-index:500;pointer-events:none;">
  <div id="movie-card" style="position:fixed;background:#000000;border:1px solid #333333;border-radius:16px;padding:16px;width:200px;height:auto;box-shadow:0 25px 100px -20px rgba(0,0,0,0.9);pointer-events:none;transform:scale(0.9);opacity:0;transition:transform 0.25s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.2s ease;">
    <div id="movie-card-poster" style="width:100%;aspect-ratio:2/3;border-radius:8px;overflow:hidden;margin-bottom:12px;background:transparent;pointer-events:auto;">
      <img id="movie-card-img" src="" alt="" style="width:100%;height:100%;object-fit:cover;">
    </div>
    <div id="movie-card-info" style="pointer-events:auto;display:flex;flex-direction:column;gap:6px;">
      <div id="movie-card-title" style="font-size:14px;font-weight:600;color:#ffffff;line-height:1.3;"></div>
      <div style="display:flex;gap:8px;align-items:center;">
        <span id="movie-card-rating" style="color:#FFB400;font-weight:600;font-size:13px;"></span>
        <span id="movie-card-year" style="color:#888888;font-size:12px;"></span>
      </div>
      <div id="movie-card-director" style="color:#aaaaaa;font-size:12px;"></div>
      <div id="movie-card-country" style="color:#666666;font-size:11px;"></div>
    </div>
  </div>
</div>

<!-- 电影详情弹窗 - 点击后在屏幕中间横向展开 -->
<div id="movie-detail-modal" style="display:none;position:fixed;inset:0;z-index:600;background:transparent;opacity:0;transition:opacity 0.3s ease;pointer-events:none;">
  <div style="position:fixed;inset:0;background:transparent;pointer-events:auto;" onclick="closeMovieDetailModal()"></div>
  <div id="movie-detail-content" style="position:absolute;left:0;top:0;transform:none;background:#000000;border:1px solid #2a2a2a;border-radius:16px;padding:0;width:200px;height:300px;overflow:hidden;display:flex;opacity:0;pointer-events:auto;box-shadow:0 25px 80px rgba(0,0,0,0.5);font-family:Arial,sans-serif;">
    <!-- 左侧：海报 -->
    <div id="movie-detail-left" style="width:240px;flex-shrink:0;position:relative;">
      <div id="movie-poster-container" style="position:absolute;inset:16px 16px 16px 20px;border-radius:8px;overflow:hidden;background:transparent;">
        <img id="movie-detail-poster" src="" alt="" style="width:100%;height:100%;object-fit:cover;display:block;">
      </div>
    </div>
    <!-- 右侧：详情 -->
    <div id="movie-detail-right" style="flex:1;padding:24px 40px 24px 24px;display:flex;flex-direction:column;justify-content:flex-start;opacity:0;transition:opacity 0.3s ease 0.2s;overflow:hidden;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">
        <div id="movie-detail-title" style="font-size:22px;font-weight:600;color:#ffffff;line-height:1.3;letter-spacing:0.02em;flex:1;"></div>
        <span id="movie-detail-rating" style="color:#FFB400;font-weight:600;font-size:15px;margin-left:12px;white-space:nowrap;"></span>
      </div>
      <div id="movie-detail-year" style="color:#888888;font-size:14px;margin-bottom:12px;"></div>

<script src="src/js/female-directors-movies-data.js"></script>
<script>
(function () {
  var data = window.femaleDirectorsMovies;
  if (!data) return;
  var count = {}, seen = {};
  data.forEach(function (m) {
    var k = m.latitude + ',' + m.longitude;
    count[k] = (count[k] || 0) + 1;
  });
  window._movieTe = data.map(function (m) {
    var k = m.latitude + ',' + m.longitude;
    var n = count[k], i = (seen[k] = (seen[k] || 0) + 1);
    var angle = (i / n) * 2 * Math.PI;
    var r = n > 1 ? 1.5 + (i * 0.7 % 1.5) : 0;
    var cosLat = Math.cos(m.latitude * Math.PI / 180) || 0.1;
    m._jlat = m.latitude + r * Math.cos(angle);
    m._jlon = m.longitude + r * Math.sin(angle) / cosLat;
    return [m._jlat, m._jlon, m.name];
  });
  window._movieBallCount = window._movieTe.length;
  
  // 标记数据加载完成
  window.dataLoaded = true;
})();

// 简化加载检测
function hideLoadingScreen() {
  setTimeout(function() {
    var loadingScreen = document.getElementById('loading-screen');
    if (loadingScreen) {
      loadingScreen.style.opacity = '0';
      setTimeout(function() {
        loadingScreen.style.display = 'none';
      }, 500);
    }
  }, 1000); // 1秒后隐藏加载界面
}

// 页面加载完成后开始检测
window.addEventListener('DOMContentLoaded', function() {
  // 延迟1秒后隐藏加载界面（基础加载完成）
  setTimeout(function() {
    hideLoadingScreen();
  }, 1000);
});
</script>
