<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">
<title>如果地球是一座花园</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000;
  overflow: hidden;
  width: 100vw; height: 100vh;
  font-family: 'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
  color: white;
}
#app { position: relative; width: 100vw; height: 100vh; }
#canvas3d { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: block; }

#title-bar {
  position: absolute; top: 22px; left: 50%; transform: translateX(-50%);
  text-align: center; pointer-events: none; z-index: 10;
}
#title-bar h1 { font-size: 20px; font-weight: 300; letter-spacing: 5px; color: #fff; text-shadow: 0 0 30px rgba(180,220,255,0.5); }
#title-bar p { font-size: 12px; color: rgba(255,255,255,0.65); margin-top: 5px; letter-spacing: 2px; }

#gear-btn {
  position: absolute; top: 18px; right: 18px; width: 28px; height: 28px;
  border: 1px solid rgba(255,255,255,0.28); border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; z-index: 10; font-size: 14px; color: rgba(255,255,255,0.65);
}


#plant-popup {
  position: absolute; display: none;
  background: rgba(12,16,30,0.95); border: 1px solid rgba(255,255,255,0.15);
  border-radius: 10px; padding: 12px 14px; width: 230px; z-index: 20;
  font-size: 12px; pointer-events: none; box-shadow: 0 4px 24px rgba(0,0,0,0.5);
}
#plant-popup h3 { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
#plant-popup .latin { color: rgba(255,255,255,0.48); font-style: italic; font-size: 11px; margin-bottom: 8px; }
#plant-popup .desc { color: rgba(255,255,255,0.75); line-height: 1.55; }
#plant-popup .tags { display: flex; gap: 6px; margin-top: 8px; font-size: 10px; }
#plant-popup .tag { background: rgba(255,255,255,0.1); padding: 2px 8px; border-radius: 10px; color: rgba(255,255,255,0.7); }
#plant-popup .pp-x { position: absolute; top: 8px; right: 10px; cursor: pointer; color: rgba(255,255,255,0.4); font-size: 15px; pointer-events: all; }

#bottom-ui {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: rgba(3,6,16,0.96);
  padding: 9px 16px 14px; z-index: 10;
  border-top: 1px solid rgba(255,255,255,0.07);
}
.tab-row { display: flex; align-items: center; gap: 5px; margin-bottom: 7px; flex-wrap: wrap; }
.tab-btn {
  padding: 3px 10px; border-radius: 14px; font-size: 12px; cursor: pointer;
  border: 1px solid rgba(255,255,255,0.18); background: transparent;
  color: rgba(255,255,255,0.68); transition: all .2s; line-height: 1.5;
}
.tab-btn:hover { border-color: rgba(255,255,255,0.45); color: white; }
.tab-btn.active { background: white; color: #111; border-color: white; font-weight: 500; }
.spacer { flex: 1; min-width: 4px; }
.ctrl-grp { display: flex; align-items: center; gap: 6px; font-size: 11px; color: rgba(255,255,255,0.55); }
.mini-sel {
  background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.18);
  color: white; padding: 2px 6px; border-radius: 12px; font-size: 11px; cursor: pointer;
}
.chk-lbl { display: flex; align-items: center; gap: 3px; font-size: 11px; color: rgba(255,255,255,0.6); cursor: pointer; white-space: nowrap; }
.chk-lbl input[type=checkbox] { width: 11px; height: 11px; accent-color: #4af; }
.filter-row { display: flex; align-items: center; gap: 10px; font-size: 11px; color: rgba(255,255,255,0.52); flex-wrap: wrap; }
.sl-grp { display: flex; align-items: center; gap: 5px; }
input[type=range].slim {
  width: 72px; height: 3px; -webkit-appearance: none; appearance: none;
  background: rgba(255,255,255,0.25); border-radius: 2px; outline: none; cursor: pointer;
}
input[type=range].slim::-webkit-slider-thumb { -webkit-appearance: none; width: 10px; height: 10px; border-radius: 50%; background: #44aaff; cursor: pointer; }
.wdot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-right: 1px; }
.val { color: rgba(255,255,255,0.8); }

/* Movie popup */
#movie-popup {
  position: absolute; display: none;
  background: rgba(16,10,0,0.96); border: 1px solid rgba(255,180,0,0.35);
  border-radius: 10px; padding: 12px 14px; width: 262px; z-index: 21;
  font-size: 12px; pointer-events: none; box-shadow: 0 4px 28px rgba(0,0,0,0.6);
  flex-direction: row; gap: 11px; align-items: flex-start;
}
#mv-poster { width:64px; height:90px; object-fit:cover; border-radius:3px; flex-shrink:0; display:none; background:rgba(255,180,0,0.06); }
.mv-info { flex:1; min-width:0; }
#movie-popup .mv-rank { font-size: 10px; color: rgba(255,180,0,0.8); margin-bottom: 2px; letter-spacing:1px; }
#movie-popup .mv-title { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
#movie-popup .mv-en { color: rgba(255,255,255,0.42); font-style: italic; font-size: 10px; margin-bottom: 8px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
#movie-popup .mv-row { display:flex; align-items:center; gap:8px; margin-top:6px; }
#movie-popup .mv-score { color: #FFD700; font-size: 20px; font-weight: bold; }
#movie-popup .mv-meta { color: rgba(255,255,255,0.5); font-size: 11px; line-height:1.6; }
#movie-popup .pp-x { position: absolute; top: 8px; right: 10px; cursor: pointer; color: rgba(255,255,255,0.4); font-size: 15px; pointer-events: all; }
/* ── Movie list side panel ──────────────────────────────────────────────────── */
#movie-list {
  position: absolute; left: 0; top: 0; bottom: 78px; width: 200px; z-index: 15;
  background: rgb(3,6,16);
  border-right: 1px solid rgba(255,255,255,0.07);
  display: flex; flex-direction: column;
}
#movie-list.hidden { display: none; }
#ml-header {
  padding: 13px 12px 9px; display: flex; justify-content: space-between; align-items: center;
  border-bottom: 1px solid rgba(255,255,255,0.07); flex-shrink: 0;
  color: rgba(255,180,0,0.9); font-size: 12px; letter-spacing: 1px; font-weight: 500;
}
#ml-header .ml-close { cursor: pointer; font-size: 18px; color: rgba(255,255,255,0.35); line-height:1; transition: color .15s; }
#ml-header .ml-close:hover { color: rgba(255,255,255,0.7); }
#ml-body { overflow-y: auto; flex: 1; padding: 3px 0; }
#ml-body::-webkit-scrollbar { width: 3px; }
#ml-body::-webkit-scrollbar-track { background: transparent; }
#ml-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.18); border-radius: 2px; }
.mli {
  padding: 5px 8px 5px 10px; cursor: pointer;
  display: flex; align-items: flex-start; gap: 6px; font-size: 11px;
  border-left: 2px solid transparent; transition: background .15s, border-color .15s;
}
.mli:hover { background: rgba(255,255,255,0.055); }
.mli.active { background: rgba(255,180,0,0.10); border-left-color: rgba(255,180,0,0.7); }
.mli-rank { min-width: 20px; text-align: right; font-size: 10px; color: rgba(255,255,255,0.28); font-weight: 700; }
.mli-body { flex: 1; overflow: hidden; }
.mli-title { color: rgba(255,255,255,0.82); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mli-meta { font-size: 9px; color: rgba(255,255,255,0.28); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
.mli-score { font-size: 10px; font-weight: 700; min-width: 26px; text-align: right; }
.sc-gold   { color: #FFD700; }
.sc-orange { color: #FF8C00; }
.sc-yellow { color: rgba(195,195,65,0.95); }
#ml-toggle {
  position: absolute; left: 200px; top: 18px; z-index: 16; cursor: pointer;
  width: 24px; height: 28px; border: 1px solid rgba(255,255,255,0.22); border-radius: 0 6px 6px 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; color: rgba(255,255,255,0.55); background: rgb(3,6,16);
  user-select: none;
}
#ml-toggle:hover { color: white; border-color: rgba(255,255,255,0.45); }
/* ── Poster overlay pins on globe ──────────────────────────────────────────── */
#poster-layer { position:absolute; inset:0; pointer-events:none; overflow:hidden; z-index:5; }
.mv-pin {
  position:absolute; width:26px; height:37px; top:0; left:0;
  border-radius:3px; overflow:hidden; pointer-events:all; cursor:pointer;
  border:1px solid rgba(255,180,0,0.38); background:rgb(5,9,20);
  box-shadow:0 1px 5px rgba(0,0,0,0.7);
}
.mv-pin img { width:100%; height:100%; object-fit:cover; display:block; }
.mv-pin .pin-rk {
  width:100%; height:100%; display:flex; align-items:center; justify-content:center;
  font-size:8px; font-weight:700;
}
.mv-pin:hover { border-color:rgba(255,210,0,0.95); z-index:25; }
.mv-pin.active { border-color:#FFD700; box-shadow:0 0 8px rgba(255,200,0,0.45); z-index:26; }
</style>
</head>
<body>
<div id="app">
  <canvas id="canvas3d"></canvas>
  <div id="poster-layer"></div>

  <!-- Movie list side panel -->
  <div id="movie-list">
    <div id="ml-header">
      <span>🎬 豆瓣 TOP 100</span>
      <span class="ml-close" onclick="toggleMovieList()">‹</span>

    <div id="ml-body"></div>
  </div>
  <div id="ml-toggle" onclick="toggleMovieList()" title="电影列表">›</div>
  <div id="title-bar">

  </div>

    <span class="pp-x" onclick="this.parentElement.style.display='none'">×</span>

  </div>

  <div id="movie-popup">

  <div id="bottom-ui">

      <button class="tab-btn" onclick="selectRegion(this,'北美')">北美</button>
      <button class="tab-btn" onclick="selectRegion(this,'南美')">南美</button>
      <button class="tab-btn" onclick="selectRegion(this,'澳洲')">澳洲</button>
      <div class="spacer"></div>
      <div class="ctrl-grp">
        <span>类型</span>
        <select class="mini-sel"><option>全部 ▾</option><option>花卉</option><option>乔木</option><option>灌木</option><option>草本</option></select>
        <span>气候</span>
        <select class="mini-sel"><option>全部 ▾</option><option>热带</option><option>温带</option><option>寒带</option><option>干旱</option></select>
        <label class="chk-lbl"><input type="checkbox" id="chk-plants" onchange="if(plantsGroup)plantsGroup.visible=this.checked"> 花草</label>
        <label class="chk-lbl"><input type="checkbox" id="chk-rotate" checked onchange="autoRotate=this.checked"> 旋转</label>
        <label class="chk-lbl"><input type="checkbox" id="chk-aurora" onchange="if(aurora)aurora.visible=this.checked"> 极光</label>
      </div>
    </div>
    <div class="filter-row">
      <div class="sl-grp">
        <span>大小</span><span style="color:rgba(255,255,255,0.22)">—</span>
        <input type="range" class="slim" min="0.1" max="3" step="0.1" value="1" oninput="document.getElementById('sv').textContent=this.value">
        <span class="val" id="sv">1.0</span>
      </div>
      <div class="sl-grp">
        <span>海拔</span><span style="color:rgba(255,255,255,0.22)">—</span>
        <input type="range" class="slim" min="0" max="8000" value="0" oninput="document.getElementById('av').textContent=this.value==='0'?'全部':this.value+'m'">
        <span class="val" id="av">全部</span>
      </div>
      <span>天气</span>
      <label class="chk-lbl"><span class="wdot" style="background:#2244ee"></span>雨<input type="checkbox"></label>
      <label class="chk-lbl"><span class="wdot" style="background:#88aad4"></span>雪<input type="checkbox"></label>
      <label class="chk-lbl"><span class="wdot" style="background:#7788aa"></span>风<input type="checkbox"></label>
      <label class="chk-lbl"><span class="wdot" style="background:#cc8833"></span>沙<input type="checkbox"></label>
      <label class="chk-lbl">随机<input type="checkbox"></label>
      <label class="chk-lbl">实时<input type="checkbox" checked></label>
      <label class="chk-lbl"><input type="checkbox" checked>极光</label>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>
<script src="plants_data.js"></script>
<script>
// ── State ─────────────────────────────────────────────────────────────────────
let autoRotate = true, aurora = null;
let plantsGroup = null;          // vegetation group — toggled by UI checkbox
let moviePositions = [];         // [{lon,lat,movie}] for click detection
let activeMovieIdx = -1;         // currently selected movie in list

// 海报URL（豆瓣CDN）— canvas兜底，真实URL异步替换
const POSTERS = {
  1:  'https://img2.doubanio.com/view/photo/s_ratio_poster/public/p480747492.jpg',
  2:  'https://img3.doubanio.com/view/photo/s_ratio_poster/public/p1910813120.jpg',
  3:  'https://img9.doubanio.com/view/photo/s_ratio_poster/public/p457760035.jpg',
  4:  'https://img9.doubanio.com/view/photo/s_ratio_poster/public/p2557573348.jpg',
  5:  'https://img9.doubanio.com/view/photo/s_ratio_poster/public/p492406163.jpg',
  6:  'https://img9.doubanio.com/view/photo/s_ratio_poster/public/p2372307693.jpg',
  7:  'https://img1.doubanio.com/view/photo/s_ratio_poster/public/p2578474613.jpg',
  8:  'https://img2.doubanio.com/view/photo/s_ratio_poster/public/p2614842420.jpg',
  9:  'https://img2.doubanio.com/view/photo/s_ratio_poster/public/p513344864.jpg',
  10: 'https://img2.doubanio.com/view/photo/s_ratio_poster/public/p511118051.jpg',
  11: 'https://img9.doubanio.com/view/photo/s_ratio_poster/public/p479682972.jpg',
  12: 'https://img2.doubanio.com/view/photo/s_ratio_poster/public/p524964272.jpg',
  13: 'https://img2.doubanio.com/view/photo/s_ratio_poster/public/p579729551.jpg',
  14: 'https://img2.doubanio.com/view/photo/s_ratio_poster/public/p452615779.jpg',
  15: 'https://img2.doubanio.com/view/photo/s_ratio_poster/public/p1461851991.jpg',
  16: 'https://img2.doubanio.com/view/photo/s_ratio_poster/public/p1910824951.jpg',
  17: 'https://img1.doubanio.com/view/photo/s_ratio_poster/public/p2540924312.jpg',
  18: 'https://img2.doubanio.com/view/photo/s_ratio_poster/public/p616779645.jpg',
  19: 'https://img2.doubanio.com/view/photo/s_ratio_poster/public/p2564556863.jpg',
  20: 'https://img2.doubanio.com/view/photo/s_ratio_poster/public/p2281766488.jpg',
};



// Region rotation target
// Formula: rotY = π/2 - (lon+180)/360 * 2π  (to center lon on camera)
const REGION_ROT = { '全球': Math.PI, '亚洲': Math.PI, '欧洲': -1.75, '非洲': -2.0, '北美': 0.18, '南美': -0.52, '澳洲': 2.44 };
let targetRotY = Math.PI;

function selectRegion(el, r) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  if (REGION_ROT[r] !== undefined) targetRotY = REGION_ROT[r];
}

// Plant popup — 500种全球真实植物数据由 plants_data.js 提供
// PLANTS 数组已在上方 <script src="plants_data.js"> 中定义

// ── THREE.JS ──────────────────────────────────────────────────────────────────
const canvas = document.getElementById('canvas3d');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x00000a, 1);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(38, window.innerWidth / window.innerHeight, 0.1, 500);
camera.position.z = 2.75;

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── STARS ─────────────────────────────────────────────────────────────────────
(function() {
  const pos = [], col = [];
  for (let i = 0; i < 5500; i++) {
    const th = Math.random() * Math.PI * 2, ph = Math.acos(2 * Math.random() - 1);
    const r = 70 + Math.random() * 280;
    pos.push(r * Math.sin(ph) * Math.cos(th), r * Math.sin(ph) * Math.sin(th), r * Math.cos(ph));
    const b = 0.4 + Math.random() * 0.6;
    const tint = Math.random();
    col.push(b * (tint > 0.8 ? 0.8 : 1), b, b * (tint > 0.6 ? 1.0 : b));
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
  g.setAttribute('color', new THREE.Float32BufferAttribute(col, 3));
  scene.add(new THREE.Points(g, new THREE.PointsMaterial({ size: 0.19, vertexColors: true, transparent: true, opacity: 0.88 })));
})();

// ── GLOBE TEXTURE (satellite photo, light-blue ocean) ─────────────────────────
const _TL = new THREE.TextureLoader();
const _TEX = 'https://raw.githubusercontent.com/mrdoob/three.js/r128/examples/textures/planets/';
const globeNormal   = _TL.load(_TEX + 'earth_normal_2048.jpg');
let _lpx = null, _lw = 0, _lh = 0;
function sampleLand(lon, lat) {
  if (!_lpx) return 1;
  const x = Math.min(Math.max(0, Math.floor((lon + 180) / 360 * _lw)), _lw - 1);
  const y = Math.min(Math.max(0, Math.floor((90 - lat) / 180 * _lh)), _lh - 1);
  const i = (y * _lw + x) * 4;
  const r = _lpx[i], g = _lpx[i+1], b = _lpx[i+2];
  // Use IDENTICAL threshold to the ocean color-shift loop below —
  // if that loop shifts a pixel, this function must also call it ocean.
  const isCloud = r > 170 && g > 170 && b > 170 && Math.abs(r - b) < 35;
  if (!isCloud && b > r + 12 && b > g && r < 160) return 0; // ocean
  return 1; // land (or cloud)
}
const globeSpecular = _TL.load(_TEX + 'earth_specular_2048.jpg');

// Load base texture: capture land mask from original pixels, then shift ocean to light blue
const globeTexture = _TL.load(_TEX + 'earth_atmos_2048.jpg', tex => {
  const src = tex.image;
  const cv = document.createElement('canvas');
  cv.width = src.width; cv.height = src.height;
  const ctx = cv.getContext('2d');
  ctx.drawImage(src, 0, 0);
  try {
    const id = ctx.getImageData(0, 0, cv.width, cv.height);
    const d = id.data;
    // Snapshot original pixels for land detection BEFORE the ocean color shift.
    // sampleLand() uses the SAME threshold as the shift loop, so the sets match exactly.
    _lw = cv.width; _lh = cv.height;
    _lpx = new Uint8ClampedArray(d.buffer.slice(0));
    placePlants();
    // ── Ocean color shift toward light blue (threshold must match sampleLand) ─
    for (let i = 0; i < d.length; i += 4) {
      const r = d[i], g = d[i+1], b = d[i+2];
      const isCloud = r > 170 && g > 170 && b > 170 && Math.abs(r - b) < 35;
      if (!isCloud && b > r + 12 && b > g && r < 160) {
        const t = Math.min(1, (b - Math.max(r, g)) / 55) * 0.92;
        d[i]   = Math.round(r + (145 - r) * t);
        d[i+1] = Math.round(g + (205 - g) * t);
        d[i+2] = Math.round(b + (238 - b) * t);
      }
    }
    ctx.putImageData(id, 0, 0);
    tex.image = cv;
    tex.needsUpdate = true;
  } catch(e) {
    // getImageData blocked (CORS / file:// context) — place plants without pixel mask
    placePlants();
  }
});

// ── GLOBE ─────────────────────────────────────────────────────────────────────
const globe = new THREE.Mesh(
  new THREE.SphereGeometry(1, 96, 96),
  new THREE.MeshPhongMaterial({
    map: globeTexture,
    normalMap: globeNormal,
    specularMap: globeSpecular,

function makeAtmShader(c, p, col, size) {
  return new THREE.Mesh(
    new THREE.SphereGeometry(size, 64, 64),
    new THREE.ShaderMaterial({
      uniforms: { c:{value:c}, p:{value:p}, glowColor:{value:new THREE.Color(col)}, viewVector:{value:camera.position.clone()} },
      vertexShader: `
        uniform vec3 viewVector; uniform float c,p; varying float intensity;
        void main() {
          vec3 vN=normalize(normalMatrix*normal);
          vec3 vV=normalize(normalMatrix*viewVector);
          intensity=pow(max(0.0,c-dot(vN,vV)),p);
          gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);
        }`,
      fragmentShader: `
        uniform vec3 glowColor; varying float intensity;
        void main() { gl_FragColor=vec4(glowColor*intensity,intensity*0.88); }`,
      side: THREE.BackSide, blending: THREE.AdditiveBlending, transparent: true, depthWrite: false,
    })
  );
}

// ── AURORA BOREALIS ───────────────────────────────────────────────────────────
(function() {
  const group = new THREE.Group();

  function curtainGeo(lat, hBot, hTop, S, V) {
    const th=(90-lat)*Math.PI/180, sinT=Math.sin(th), cosT=Math.cos(th);
    const pos=[],uvs=[],idx=[];
    for(let i=0;i<=S;i++){
      const phi=(i/S)*Math.PI*2, cp=Math.cos(phi), sp=Math.sin(phi);
      for(let j=0;j<=V;j++){
        const t=j/V, h=hBot+t*(hTop-hBot);
        pos.push(-h*cp*sinT, h*cosT, h*sp*sinT);
        uvs.push(i/S, t);
      }
    }
    for(let i=0;i<S;i++) for(let j=0;j<V;j++){
      const a=i*(V+1)+j,b=a+1,c=(i+1)*(V+1)+j,d=c+1;
      idx.push(a,b,d, a,d,c);
    }
    const g=new THREE.BufferGeometry();
    g.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
    g.setAttribute('uv',new THREE.Float32BufferAttribute(uvs,2));
    g.setIndex(idx); return g;
  }

  const VS=`varying vec2 vUv;void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`;
  const NOISE=`float h21(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5);}
    float N(vec2 p){vec2 i=floor(p),f=fract(p);f*=f*(3.-2.*f);
      return mix(mix(h21(i),h21(i+vec2(1,0)),f.x),mix(h21(i+vec2(0,1)),h21(i+vec2(1,1)),f.x),f.y);}`;

  // ── 主光幕：65°N，高度适中，柔和列带 ───────────────────────────────────
  group.add(new THREE.Mesh(curtainGeo(65,1.01,1.36,160,36), new THREE.ShaderMaterial({
    uniforms:{uTime:{value:0}},
    vertexShader:VS,
    fragmentShader:`uniform float uTime;varying vec2 vUv;${NOISE}
      void main(){
        float u=vUv.x,v=vUv.y;
        float vf=smoothstep(0.,.12,v)*smoothstep(1.,.32,v);
        // 柔和扭曲 + 稀疏竖列
        float warp=N(vec2(u*4.+uTime*.10,v*1.5))*5.0;
        float col=pow(max(0.,sin((u*80.+warp+uTime*.55)*3.14159)),1.8);
        float pulse=0.55+0.45*N(vec2(u*2.5+uTime*.08,v*.6));
        float bright=clamp(col*vf*pulse*0.85,0.,0.60);
        // 主色：翠绿，顶部微带青
        vec3 lo=vec3(0.05,0.92,0.38), hi=vec3(0.00,0.72,0.85);
        vec3 col3=mix(lo,hi,smoothstep(0.2,0.8,v));
        gl_FragColor=vec4(col3*bright, bright*.70);
      }`,
    transparent:true,blending:THREE.AdditiveBlending,side:THREE.DoubleSide,depthWrite:false,
  })));

  // ── 外缘弥散光：62°N，更低更柔 ─────────────────────────────────────────
  group.add(new THREE.Mesh(curtainGeo(62,1.01,1.22,120,24), new THREE.ShaderMaterial({
    uniforms:{uTime:{value:0}},
    vertexShader:VS,
    fragmentShader:`uniform float uTime;varying vec2 vUv;${NOISE}
      void main(){
        float u=vUv.x,v=vUv.y;
        float vf=smoothstep(0.,.18,v)*smoothstep(1.,.42,v);
        float warp=N(vec2(u*3.-uTime*.09,v*2.))*4.5;
        float col=pow(max(0.,sin((u*55.+warp-uTime*.40)*3.14159)),1.5);
        float pulse=0.5+0.5*N(vec2(u*2.+uTime*.07,v));
        float bright=clamp(col*vf*pulse*0.60,0.,0.38);
        vec3 colA=mix(vec3(0.04,.85,.42),vec3(.10,.60,.80),v*.5);
        gl_FragColor=vec4(colA*bright,bright*.65);
      }`,
    transparent:true,blending:THREE.AdditiveBlending,side:THREE.DoubleSide,depthWrite:false,
  })));

  // ── 极冠淡晕（很克制）──────────────────────────────────────────────────
  {
    const cv=document.createElement('canvas');cv.width=cv.height=128;
    const cx=cv.getContext('2d'),gr=cx.createRadialGradient(64,64,0,64,64,64);
    gr.addColorStop(0,   'rgba(60,200,120,.22)');
    gr.addColorStop(.45, 'rgba(0,160,100,.10)');
    gr.addColorStop(1,   'rgba(0,0,0,0)');
    cx.fillStyle=gr; cx.fillRect(0,0,128,128);
    const sp=new THREE.Sprite(new THREE.SpriteMaterial({
      map:new THREE.CanvasTexture(cv),
      transparent:true,blending:THREE.AdditiveBlending,depthWrite:false,opacity:.55,
    }));
    sp.position.set(0,1.06,0);
    sp.scale.set(0.75,0.75,0.75);
    group.add(sp);
  }

  aurora=group;
  aurora.visible=document.getElementById('chk-aurora').checked;
  scene.add(aurora);
})();

// ── VEGETATION: sprite ground cover + GLTF 3D models ─────────────────────────
function placePlants() {
  plantsGroup = new THREE.Group();
  plantsGroup.visible = false;   // hidden by default; checkbox enables it
  globe.add(plantsGroup);
  function onLand(lon, lat) {
    const base = sampleLand(lon, lat);
    if (base === 0) return 0; // ocean pixel — skip
    // Desert biome zones (bounding boxes used only for biome type, not land/sea)
    if ((lon>=-5  && lon<=38  && lat>=14 && lat<=37)  ||  // Sahara
        (lon>=36  && lon<=58  && lat>=10 && lat<=25)  ||  // Arabian desert
        (lon>=70  && lon<=110 && lat>=35 && lat<=50)  ||  // Central Asian steppe
        (lon>=-125&& lon<=-95 && lat>=28 && lat<=42)  ||  // SW USA / Sonoran
        (lon>=-78 && lon<=-64 && lat>=-25&& lat<=-14) ||  // Atacama / Andean dry
        (lon>=116 && lon<=140 && lat>=-34&& lat<=-20))    // Australian outback
      return 2;
    return 1;
  }

  // ── Cluster helper ────────────────────────────────────────────────────────
  // Places n lon/lat points grouped around ~n/20 random biome-valid centers,
  // producing forests, groves and flower meadows instead of scattered singles.
  function makeClusteredLL(n, clusterR, biomeTest) {
    const nC = Math.max(2, Math.round(n / 20));
    const centers = [];
    for (let t = 0; t < 300000 && centers.length < nC; t++) {
      const lo = Math.random()*360-180, la = Math.random()*180-90;
      const land = onLand(lo, la);
      if (land && biomeTest(lo, la, land)) centers.push([lo, la]);
    }
    if (!centers.length) return [];
    const pts = [];
    for (let t = 0; t < 1500000 && pts.length < n; t++) {
      const [clo, cla] = centers[Math.floor(Math.random()*centers.length)];
      const lo = clo + (Math.random()*2-1)*clusterR;
      const la = Math.max(-89, Math.min(89, cla + (Math.random()*2-1)*clusterR*0.7));
      const land = onLand(lo, la);
      if (land && biomeTest(lo, la, land)) pts.push([lo, la]);
    }
    return pts;
  }

  // Mediterranean zone shorthand
  const M = (lo,la) =>
    (lo>=-10&&lo<=36&&la>=30&&la<=46) ||
    (lo>=-125&&lo<=-110&&la>=30&&la<=40) ||
    (lo>=144&&lo<=154&&la>=-40&&la<=-30);

  // ── 3D model positions: clustered for forest / grove / field density ──────
  const P3 = {
    flower:     makeClusteredLL(600,  6,  (lo,la,land)=>land!==2&&Math.abs(la)<68),
    palmT:      makeClusteredLL(380,  11, (lo,la,land)=>land!==2&&Math.abs(la)<15),
    palmS:      makeClusteredLL(360,  9,  (lo,la,land)=>land!==2&&Math.abs(la)>=15&&Math.abs(la)<30),
    treeB:      makeClusteredLL(600,  13, (lo,la,land)=>land!==2&&Math.abs(la)>=15&&Math.abs(la)<65),
    treeS:      makeClusteredLL(560,  12, (lo,la,land)=>land!==2&&Math.abs(la)>=15&&Math.abs(la)<65),
    cactus:     makeClusteredLL(280,  10, (lo,la,land)=>land===2),
    palmDL:     makeClusteredLL(300,  10, (lo,la,land)=>land!==2&&Math.abs(la)<30),
    palmDS:     makeClusteredLL(260,  8,  (lo,la,land)=>land!==2&&(Math.abs(la)>=15&&Math.abs(la)<30||M(lo,la))),
    mushroom:   makeClusteredLL(400,  7,  (lo,la,land)=>land!==2&&Math.abs(la)>=30&&Math.abs(la)<62),
    lowTree:    makeClusteredLL(500,  11, (lo,la,land)=>land!==2&&Math.abs(la)>=30&&Math.abs(la)<62),
    plant:      makeClusteredLL(280,  7,  (lo,la,land)=>land!==2&&Math.abs(la)<30),
    pineapple:  makeClusteredLL(180,  5,  (lo,la,land)=>land!==2&&Math.abs(la)<15),
    corn:       makeClusteredLL(260,  5,  (lo,la,land)=>land!==2&&Math.abs(la)>=30&&Math.abs(la)<62),
    grapes:     makeClusteredLL(140,  5,  (lo,la,land)=>land!==2&&M(lo,la)),
    orange:     makeClusteredLL(150,  6,  (lo,la,land)=>land!==2&&(Math.abs(la)>=15&&Math.abs(la)<30||M(lo,la))),
    lemon:      makeClusteredLL(110,  5,  (lo,la,land)=>land!==2&&(Math.abs(la)>=15&&Math.abs(la)<30||M(lo,la))),
    pumpkin:    makeClusteredLL(180,  5,  (lo,la,land)=>land!==2&&Math.abs(la)>=30&&Math.abs(la)<62),
    strawberry: makeClusteredLL(180,  5,  (lo,la,land)=>land!==2&&Math.abs(la)>=30&&Math.abs(la)<62),
    broccoli:   makeClusteredLL(160,  5,  (lo,la,land)=>land!==2&&Math.abs(la)>=30&&Math.abs(la)<62),
    carrot:     makeClusteredLL(130,  5,  (lo,la,land)=>land!==2&&Math.abs(la)>=30&&Math.abs(la)<62),
    eggplant:   makeClusteredLL(110,  5,  (lo,la,land)=>land!==2&&(Math.abs(la)>=15&&Math.abs(la)<30||M(lo,la))),
    pepper:     makeClusteredLL(100,  5,  (lo,la,land)=>land!==2&&(Math.abs(la)>=15&&Math.abs(la)<30||M(lo,la))),
    tomato:     makeClusteredLL(130,  5,  (lo,la,land)=>land!==2&&Math.abs(la)>=30&&Math.abs(la)<62),
    kgPlant:    makeClusteredLL(240,  8,  (lo,la,land)=>land!==2&&Math.abs(la)<30),
    kgFlower:   makeClusteredLL(180,  5,  (lo,la,land)=>land!==2&&Math.abs(la)>=30&&Math.abs(la)<62),
  };

  // ── GLTF instancing: place N copies of a loaded model on the globe ─────────
  const _dummy=new THREE.Object3D(), _yUp=new THREE.Vector3(0,1,0);
  const _tmpQ=new THREE.Quaternion(), _tmpV=new THREE.Vector3();

  function addInstanced(gltfScene, positions, baseScale) {
    if(!positions.length) return;
    gltfScene.updateMatrixWorld(true);
    // Extract each mesh with its scene-local transform baked into geometry
    const parts=[];
    gltfScene.traverse(child=>{
      if(!child.isMesh) return;
      const geo=child.geometry.clone();
      geo.applyMatrix4(child.matrixWorld); // bake local transform
      parts.push({geo, mat:child.material});
    });
    parts.forEach(({geo,mat})=>{
      const im=new THREE.InstancedMesh(geo, mat, positions.length);
      positions.forEach(([lon,lat],i)=>{
        const th=lon*Math.PI/180, ph=(90-lat)*Math.PI/180, r=1.016;
        const x=r*Math.sin(ph)*Math.cos(th), y=r*Math.cos(ph), z=-r*Math.sin(ph)*Math.sin(th);
        _tmpV.set(x,y,z).normalize();
        _tmpQ.setFromUnitVectors(_yUp, _tmpV);          // align Y → outward
        _dummy.position.set(x,y,z);
        _dummy.quaternion.copy(_tmpQ);
        _dummy.rotateOnWorldAxis(_tmpV, Math.random()*Math.PI*2); // random azimuth
        _dummy.scale.setScalar(baseScale*(0.65+Math.random()*.75));
        _dummy.updateMatrix();
        im.setMatrixAt(i, _dummy.matrix);
      });
      im.instanceMatrix.needsUpdate=true;
      plantsGroup.add(im);
    });
  }

  // ── Load 3D models (async — appear as they arrive) ────────────────────────
  const L = new THREE.GLTFLoader();
  const draco = new THREE.DRACOLoader();
  draco.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/libs/draco/');
  L.setDRACOLoader(draco);
  const PM = 'https://raw.githubusercontent.com/pmndrs/market-assets/main/files/models/';
  const TH = 'https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/models/gltf/';
  const KG = 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/';

  L.load(TH+'Flower/Flower.glb',                g=>addInstanced(g.scene, P3.flower,     0.022));
  // ── Palms & tropical trees ──
  L.load(PM+'palm-long/model.gltf',             g=>addInstanced(g.scene, P3.palmT,      0.015));
  L.load(PM+'palm-short/model.gltf',            g=>addInstanced(g.scene, P3.palmS,      0.014));
  L.load(PM+'palm-detailed-long/model.gltf',    g=>addInstanced(g.scene, P3.palmDL,     0.015));
  L.load(PM+'palm-detailed-short/model.gltf',   g=>addInstanced(g.scene, P3.palmDS,     0.014));
  // ── Trees ──
  L.load(PM+'tree-big/model.gltf',              g=>addInstanced(g.scene, P3.treeB,      0.015));
  L.load(PM+'tree-small/model.gltf',            g=>addInstanced(g.scene, P3.treeS,      0.014));
  L.load(PM+'low-poly-tree/model.gltf',         g=>addInstanced(g.scene, P3.lowTree,    0.018));
  // ── Desert & arid ──
  L.load(PM+'cactus/model.gltf',                g=>addInstanced(g.scene, P3.cactus,     0.014));
  // ── Tropical plants ──
  L.load(PM+'plant/model.gltf',                 g=>addInstanced(g.scene, P3.plant,      0.014));
  L.load(PM+'pineapple/model.gltf',             g=>addInstanced(g.scene, P3.pineapple,  0.014));
  // ── Forest floor ──
  L.load(PM+'mushroom/model.gltf',              g=>addInstanced(g.scene, P3.mushroom,   0.011));
  // ── Mediterranean harvest ──
  L.load(PM+'grapes/model.gltf',                g=>addInstanced(g.scene, P3.grapes,     0.013));
  L.load(PM+'orange/model.gltf',                g=>addInstanced(g.scene, P3.orange,     0.013));
  L.load(PM+'lemon/model.gltf',                 g=>addInstanced(g.scene, P3.lemon,      0.013));
  L.load(PM+'tomato/model.gltf',                g=>addInstanced(g.scene, P3.tomato,     0.013));
  L.load(PM+'pepper/model.gltf',                g=>addInstanced(g.scene, P3.pepper,     0.013));
  L.load(PM+'eggplant/model.gltf',              g=>addInstanced(g.scene, P3.eggplant,   0.013));
  // ── Temperate garden ──
  L.load(PM+'corn/model.gltf',                  g=>addInstanced(g.scene, P3.corn,       0.014));
  L.load(PM+'pumpkin/model.gltf',               g=>addInstanced(g.scene, P3.pumpkin,    0.013));
  L.load(PM+'strawberry/model.gltf',            g=>addInstanced(g.scene, P3.strawberry, 0.011));
  L.load(PM+'broccoli/model.gltf',              g=>addInstanced(g.scene, P3.broccoli,   0.013));
  L.load(PM+'carrot/model.gltf',                g=>addInstanced(g.scene, P3.carrot,     0.013));
  // ── KhronosGroup/glTF-Sample-Assets ──
  L.load(KG+'DiffuseTransmissionPlant/glTF-Binary/DiffuseTransmissionPlant.glb',
         g=>addInstanced(g.scene, P3.kgPlant,  0.017));
  L.load(KG+'GlassVaseFlowers/glTF-Binary/GlassVaseFlowers.glb',
         g=>addInstanced(g.scene, P3.kgFlower, 0.014));

  // ── EMOJI SPRITE PLANTS ────────────────────────────────────────────────────
  // 16 plant/flower species as billboard Point sprites (Twemoji PNG, always face camera)
  // Uses onLand() + biome filter for realistic geographic placement
  // Transparent PNG → plant-shaped billboard, overlapping allowed for lush density
  {
    const EBASE = 'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/';
    // r = cluster radius in degrees (larger = wider groves/meadows)
    const ESP = [
      {c:'1f338',sz:.063,n:700, r:6,  f:(lo,la,a,d)=>!d&&a>=20&&a<62},           // 🌸 Cherry Blossom
      {c:'1f33a',sz:.066,n:600, r:5,  f:(lo,la,a,d)=>!d&&a<22},                  // 🌺 Hibiscus
      {c:'1f33c',sz:.060,n:800, r:6,  f:(lo,la,a,d)=>!d&&a<68},                        // 🌼 Blossom
      {c:'1f33b',sz:.063,n:600, r:5,  f:(lo,la,a,d)=>!d&&a>=18&&a<55},           // 🌻 Sunflower field
      {c:'1f339',sz:.060,n:600, r:5,  f:(lo,la,a,d)=>!d&&a>=22&&a<56},           // 🌹 Rose garden
      {c:'1f337',sz:.057,n:550, r:5,  f:(lo,la,a,d)=>!d&&a>=38&&a<62},           // 🌷 Tulip field
      {c:'1f33f',sz:.070,n:700, r:7,  f:(lo,la,a,d)=>!d&&a<30},                  // 🌿 Fern undergrowth
      {c:'1f334',sz:.091,n:550, r:10, f:(lo,la,a,d)=>!d&&a<20},                  // 🌴 Palm grove
      {c:'1f335',sz:.084,n:480, r:10, f:(lo,la,a,d)=>d},                         // 🌵 Cactus patch
      {c:'1f332',sz:.087,n:700, r:12, f:(lo,la,a,d)=>!d&&a>=50&&a<68},                 // 🌲 Boreal forest
      {c:'1f333',sz:.084,n:700, r:11, f:(lo,la,a,d)=>!d&&a>=28&&a<62},           // 🌳 Deciduous forest
      {c:'1f343',sz:.063,n:650, r:6,  f:(lo,la,a,d)=>!d&&a<32},                  // 🍃 Tropical canopy
      {c:'1f340',sz:.057,n:600, r:6,  f:(lo,la,a,d)=>!d&&a>=28&&a<62},           // 🍀 Clover meadow
      {c:'1f33e',sz:.066,n:550, r:5,  f:(lo,la,a,d)=>!d&&a<35},                  // 🌾 Wheat field
      {c:'1f341',sz:.063,n:500, r:8,  f:(lo,la,a,d)=>!d&&a>=32&&a<60},           // 🍁 Maple grove
      {c:'1f38b',sz:.084,n:500, r:7,  f:(lo,la,a,d)=>!d&&a<36&&lo>=65&&lo<=148}, // 🎋 Bamboo grove
    ];

    const TL=new THREE.TextureLoader();
    ESP.forEach(s => {
      // Build clustered XYZ positions for this sprite species
      const pts = makeClusteredLL(s.n, s.r, (lo, la, land) => {
        const a = Math.abs(la), d = land===2;
        return s.f(lo, la, a, d);
      });
      const p = [];
      pts.forEach(([lo, la]) => {
        const th=lo*Math.PI/180, ph=(90-la)*Math.PI/180;
        const r=1.013+Math.random()*.020;
        p.push(r*Math.sin(ph)*Math.cos(th), r*Math.cos(ph), -r*Math.sin(ph)*Math.sin(th));
      });
      if (!p.length) return;
      TL.load(EBASE+s.c+'.png', tex=>{
        const geo=new THREE.BufferGeometry();
        geo.setAttribute('position',new THREE.Float32BufferAttribute(p,3));
        plantsGroup.add(new THREE.Points(geo, new THREE.PointsMaterial({
          map:tex, size:s.sz, sizeAttenuation:true,
          transparent:true, alphaTest:.04, depthWrite:false,
          opacity:0.92
        })));
      });
    });
  }
}

// ── CANVAS POSTER GENERATOR (no external deps) ────────────────────────────────
function makePosterURL(m, w, h) {
  const cv = document.createElement('canvas');
  cv.width = w; cv.height = h;
  const c = cv.getContext('2d');
  const hue = (m.r * 97 + 200) % 360;
  const g = c.createLinearGradient(0, 0, w * 0.4, h);
  g.addColorStop(0, `hsl(${hue},55%,13%)`);
  g.addColorStop(1, `hsl(${(hue+50)%360},30%,4%)`);
  c.fillStyle = g; c.fillRect(0, 0, w, h);
  // accent stripe
  c.fillStyle = `hsla(${hue},80%,55%,0.22)`;
  c.fillRect(0, 0, Math.ceil(w * 0.13), h);
  // score
  const sc = m.s >= 9.5 ? '#FFD700' : m.s >= 9.2 ? '#FF8C00' : '#B8B830';
  c.fillStyle = sc;
  c.font = `bold ${Math.round(h * 0.2)}px sans-serif`;
  c.textAlign = 'center'; c.textBaseline = 'middle';
  c.fillText(m.s.toFixed(1), w / 2, h * 0.75);
  if (w >= 50) {
    // popup size: show title chars vertically
    c.fillStyle = 'rgba(255,255,255,0.82)';
    c.font = `bold ${Math.round(h * 0.12)}px sans-serif`;
    c.textBaseline = 'top';
    [...m.t].slice(0, 4).forEach((ch, i) => c.fillText(ch, w / 2, h * 0.06 + i * h * 0.145));
  } else {
    // pin size: show rank
    c.fillStyle = 'rgba(255,255,255,0.45)';
    c.font = `${Math.round(h * 0.19)}px sans-serif`;
    c.textBaseline = 'top'; c.textAlign = 'center';
    c.fillText(m.r, w / 2, h * 0.05);
  }
  return cv.toDataURL();
}

// ── MOUSE DRAG & ZOOM ─────────────────────────────────────────────────────────
let drag = false, px = 0, py = 0, vx = 0, vy = 0;
let camZ = 2.75, targetZ = 2.75;
const Z_MIN = 1.38, Z_MAX = 6.5;

canvas.addEventListener('mousedown', e => { drag=true; px=e.clientX; py=e.clientY; });
canvas.addEventListener('mouseup', () => drag=false);
canvas.addEventListener('mousemove', e => {
  if (!drag) return;
  vx += (e.clientX-px)*0.003; vy += (e.clientY-py)*0.002;
  px=e.clientX; py=e.clientY;
});
// 滚轮缩放
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  targetZ = Math.max(Z_MIN, Math.min(Z_MAX, targetZ + e.deltaY * 0.004));
}, { passive: false });

// 触控：单指旋转 / 双指捏合缩放
let pinchDist = 0;
canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    pinchDist = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
  } else {
    drag=true; px=e.touches[0].clientX; py=e.touches[0].clientY;
  }
}, {passive:true});
canvas.addEventListener('touchend', () => drag=false);
canvas.addEventListener('touchmove', e => {
  if (e.touches.length === 2) {
    const d = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
    targetZ = Math.max(Z_MIN, Math.min(Z_MAX, targetZ - (d - pinchDist) * 0.012));
    pinchDist = d;
    e.preventDefault(); return;
  }
  const dx=e.touches[0].clientX-px, dy=e.touches[0].clientY-py;
  vx+=dx*0.004; px=e.touches[0].clientX; py=e.touches[0].clientY;
  e.preventDefault();
}, {passive:false});

// Globe click → movie popup (priority) or plant popup
const ray = new THREE.Raycaster(), mpos = new THREE.Vector2();
canvas.addEventListener('click', e => {
  mpos.x=(e.clientX/window.innerWidth)*2-1;
  mpos.y=-(e.clientY/window.innerHeight)*2+1;
  ray.setFromCamera(mpos, camera);
  const h = ray.intersectObject(globe);
  if (!h.length) return;

  // Convert intersection world-point → globe-local lon/lat
  const lp = globe.worldToLocal(h[0].point.clone());
  const phi = Math.acos(Math.max(-1,Math.min(1,lp.y)));
  const hitLat = 90 - phi*180/Math.PI;
  const hitLon = Math.atan2(-lp.z, lp.x)*180/Math.PI;

  // Find nearest movie within ~6°
  let nearest=null, minD=Infinity;
  moviePositions.forEach(mp=>{
    let dlo=mp.lon-hitLon;
    if(dlo>180)dlo-=360; if(dlo<-180)dlo+=360;
    const d=Math.sqrt((mp.lat-hitLat)**2+(dlo*Math.cos(hitLat*Math.PI/180))**2);
    if(d<minD){minD=d;nearest=mp;}
  });

  if(nearest && minD<6){
    const m=nearest.m;
    document.getElementById('mv-rank').textContent='豆瓣 TOP '+m.r;
    document.getElementById('mv-title').textContent=m.t;
    document.getElementById('mv-en').textContent=m.e;
    document.getElementById('mv-score').textContent=m.s.toFixed(1);
    document.getElementById('mv-meta').textContent=m.y+' · '+_mvCountry(m.lo,m.la);
    const poster=document.getElementById('mv-poster');
    poster.src=makePosterURL(m,64,90); poster.style.display='block';
    if(m.poster){const pr=new Image();pr.onload=()=>{poster.src=m.poster;};pr.src=m.poster;}
    const mp2=document.getElementById('movie-popup');
    mp2.style.display='flex';
    mp2.style.left=Math.min(e.clientX+14,window.innerWidth-278)+'px';
    mp2.style.top=Math.max(e.clientY-90,60)+'px';
    document.getElementById('plant-popup').style.display='none';
  } else if(typeof PLANTS!=='undefined'&&PLANTS&&PLANTS.length){
    const p=PLANTS[Math.floor(Math.random()*PLANTS.length)];
    const pp=document.getElementById('plant-popup');
    document.getElementById('pp-name').textContent=p.name;
    document.getElementById('pp-latin').textContent=p.latin;
    document.getElementById('pp-desc').textContent=p.desc;
    document.getElementById('pp-tag').textContent=p.tag;
    pp.style.display='block';
    pp.style.left=Math.min(e.clientX+14,window.innerWidth-250)+'px';
    pp.style.top=Math.max(e.clientY-90,60)+'px';
    document.getElementById('movie-popup').style.display='none';
  }
});

function _mvCountry(lo,la){
  if(lo>100&&lo<145&&la>20&&la<50)return'日本';
  if(lo>105&&lo<125&&la>30&&la<45)return'中国';
  if(lo>100&&lo<135&&la>30&&la<45)return'中国';
  if(lo>108&&lo<123&&la>18&&la<26)return'香港';
  if(lo>120&&lo<130&&la>34&&la<40)return'韩国';
  if(lo>65&&lo<95&&la>10&&la<30) return'印度';
  if(lo>45&&lo<58&&la>30&&la<40) return'伊朗';
  if(lo>165&&la<-35)             return'新西兰';
  if(lo>118&&lo<125&&la>23&&la<27)return'台湾';
  if(lo>88&&lo<95&&la>32&&la<38) return'中国';
  if(lo>10&&lo<15&&la>54&&la<58) return'丹麦';
  if(lo>10&&lo<15&&la>40&&la<45) return'意大利';
  if(lo>2 &&lo<3 &&la>48&&la<50) return'法国';
  if(lo>-1&&lo<0 &&la>50&&la<53) return'英国';
  if(lo>-5&&lo<-2&&la>39&&la<42) return'西班牙';
  if(lo<0&&la>25&&la<50)          return'美国';
  return '美国';
}

// ── MOVIE LIST PANEL ──────────────────────────────────────────────────────────
function buildMovieList(D) {
  const body = document.getElementById('ml-body');
  if (!body) return;
  D.forEach((m, i) => {
    const div = document.createElement('div');
    div.className = 'mli';
    div.id = 'mli-' + i;
    const sc = m.s >= 9.5 ? 'sc-gold' : m.s >= 9.2 ? 'sc-orange' : 'sc-yellow';
    div.innerHTML =
      '<span class="mli-rank">' + m.r + '</span>' +
      '<span class="mli-body">' +
        '<div class="mli-title">' + m.t + '</div>' +
        '<div class="mli-meta">' + m.y + ' · ' + _mvCountry(m.lo, m.la) + '</div>' +
      '</span>' +
      '<span class="mli-score ' + sc + '">' + m.s.toFixed(1) + '</span>';
    div.addEventListener('click', () => selectMovieFromList(i, m));
    body.appendChild(div);
  });
}

function selectMovieFromList(i, m) {
  // Deactivate previous item
  if (activeMovieIdx >= 0) {
    const prev = document.getElementById('mli-' + activeMovieIdx);
    if (prev) prev.classList.remove('active');
    const prevPin = document.getElementById('mpin-' + activeMovieIdx);
    if (prevPin) prevPin.classList.remove('active');
  }
  activeMovieIdx = i;
  const el = document.getElementById('mli-' + i);
  if (el) el.classList.add('active');
  const pin = document.getElementById('mpin-' + i);
  if (pin) pin.classList.add('active');

  // Rotate globe to movie location
  const mp = moviePositions[i];
  targetRotY = Math.PI / 2 - (mp.lon + 180) * Math.PI / 180;

  // Show movie popup at fixed top-right position
  document.getElementById('mv-rank').textContent  = '豆瓣 TOP ' + m.r;
  document.getElementById('mv-title').textContent = m.t;
  document.getElementById('mv-en').textContent    = m.e;
  document.getElementById('mv-score').textContent = m.s.toFixed(1);
  document.getElementById('mv-meta').textContent  = m.y + ' · ' + _mvCountry(m.lo, m.la);
  const poster = document.getElementById('mv-poster');
  poster.src = makePosterURL(m, 64, 90);
  poster.style.display = 'block';
  if (m.poster) { const pr = new Image(); pr.onload = () => { poster.src = m.poster; }; pr.src = m.poster; }
  const popup = document.getElementById('movie-popup');
  popup.style.display = 'flex';
  popup.style.left = (window.innerWidth - 278) + 'px';
  popup.style.top  = '70px';
  document.getElementById('plant-popup').style.display = 'none';
}

function toggleMovieList() {
  const list   = document.getElementById('movie-list');
  const toggle = document.getElementById('ml-toggle');
  const hidden = list.classList.toggle('hidden');
  toggle.textContent  = hidden ? '›' : '‹';
  toggle.style.left   = hidden ? '0px' : '200px';
  toggle.style.borderRadius = hidden ? '0 6px 6px 0' : '0 6px 6px 0';
}

// ── ANIMATION ─────────────────────────────────────────────────────────────────
const clock = new THREE.Clock();
let rotY = Math.PI, rotX = 0;

// Poster pin 3D→2D projection (reusable vectors to avoid GC)
const _pv = new THREE.Vector3(), _pvb = new THREE.Vector3(), _pvc = new THREE.Vector3();
function updatePosterPins() {
  const hw = window.innerWidth * 0.5, hh = window.innerHeight * 0.5;
  _pvb.copy(camera.position).normalize();
  moviePositions.forEach(mp => {
    const el = mp.el; if (!el) return;
    const th = mp.lon * Math.PI / 180, ph = (90 - mp.lat) * Math.PI / 180;
    _pv.set(1.015*Math.sin(ph)*Math.cos(th), 1.015*Math.cos(ph), -1.015*Math.sin(ph)*Math.sin(th))
       .applyMatrix4(globe.matrixWorld);
    _pvc.copy(_pv).normalize();
    const d = _pvc.dot(_pvb);
    if (d < 0.08) { el.style.display = 'none'; return; }
    _pv.project(camera);
    el.style.display = 'block';
    el.style.left = Math.round((_pv.x + 1) * hw - 13) + 'px';
    el.style.top  = Math.round((-_pv.y + 1) * hh - 18) + 'px';
    el.style.opacity = Math.min(1, (d - 0.08) / 0.18).toFixed(2);
  });
}

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  const t = clock.getElapsedTime();

  if (!drag) { vx*=0.88; vy*=0.88; }
  if (autoRotate) vx += 0.018 * dt;
  rotY += vx; rotX += vy;
  rotX = Math.max(-0.55, Math.min(0.55, rotX));
  vx *= 0.94; vy *= 0.94;

  // Smooth target rotation
  const diff = targetRotY - rotY;
  const dmod = ((diff + Math.PI) % (Math.PI*2)) - Math.PI;
  if (!drag) rotY += dmod * 0.035;

  globe.rotation.y = rotY;
  globe.rotation.x = rotX;

  // 平滑缩放
  camZ += (targetZ - camZ) * 0.1;
  camera.position.z = camZ;

  if (aurora && aurora.visible) {
    aurora.rotation.y = rotY;
    aurora.rotation.x = rotX;
    aurora.children.forEach(m => { if (m.material && m.material.uniforms) m.material.uniforms.uTime.value = t; });
  }
  atm1.rotation.y = rotY * 0.25;
  atm2.rotation.y = rotY * 0.18;

  atm1.material.uniforms.viewVector.value.copy(camera.position);
  atm2.material.uniforms.viewVector.value.copy(camera.position);

  renderer.render(scene, camera);
  updatePosterPins();
}
animate();
</script>
